<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldArch - System</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; font-family: Helvetica, Arial, sans-serif; 
            text-transform: uppercase; cursor: crosshair;
        }
        
        canvas#starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* Initial Branding */
        .brand-watermark { 
            position: absolute; z-index: 10; text-align: center; 
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-title { font-weight: 900; font-size: 8vw; opacity: 0.12; letter-spacing: -4px; line-height: 0.8; }
        .sub-title { font-size: 1.1vw; letter-spacing: 10px; opacity: 0.05; margin-top: 10px; }

        /* The Hub (Orbiting Silhouettes) */
        #hubLayer { 
            opacity: 0; transition: opacity 1.5s ease; pointer-events: none; 
            position: relative; z-index: 50; width: 1px; height: 1px; 
        }
        .shoe { position: absolute; width: 240px; transform-origin: center; margin-left: -120px; margin-top: -120px; opacity: 0.4; filter: grayscale(1); }
        .orbit { animation: orbit 25s linear infinite; }
        .delay-1 { animation-delay: -8.3s; }
        .delay-2 { animation-delay: -16.6s; }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(320px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(320px) rotate(-360deg); }
        }

        /* UI Controls */
        .ui-btn { 
            position: fixed; bottom: 30px; background: none; 
            border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); 
            padding: 10px 22px; cursor: pointer; font-size: 9px; letter-spacing: 4px; 
            z-index: 600; opacity: 0; transition: 0.5s;
        }
        .ui-btn:hover { background: #fff; color: #000; opacity: 1; }
        .left-btn { left: 30px; } .right-btn { right: 30px; }

        #heavyHUD { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); z-index: 600; opacity: 0; transition: 1s; text-align: center; }
    </style>
</head>
<body onclick="bootSystem()">

    <canvas id="starfield"></canvas>

    <div class="brand-watermark" id="logo">
        <div class="main-title">WorldArch</div>
        <div class="sub-title">System // Start</div>
    </div>

    <div id="heavyHUD">
        <div style="font-size: 8px; letter-spacing: 3px; color: rgba(255,255,255,0.3);">HEAVY_SYSTEM // ACTIVE</div>
        <audio id="mainTrack" loop></audio>
    </div>

    <button class="ui-btn left-btn" id="fashionBtn">FASHION</button>
    <button class="ui-btn right-btn" id="supportBtn">SUPPORT</button>

    <div id="hubLayer">
        <img src="majalperu.jpg" class="shoe orbit">
        <img src="mafulljggng3.jpg" class="shoe orbit delay-1">
        <img src="mafulljggng2.jpg" class="shoe orbit delay-2">
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('mainTrack');
        const playlist = ["soul%20breaks.mp3", "iano%20choppers.mp3"];
        
        function bootSystem() {
            document.getElementById('logo').style.opacity = "0.02";
            document.getElementById('hubLayer').style.opacity = "1";
            document.getElementById('heavyHUD').style.opacity = "1";
            document.getElementById('fashionBtn').style.opacity = "1";
            document.getElementById('supportBtn').style.opacity = "1";
            
            audio.src = playlist[0];
            audio.play();
            document.body.onclick = null; 
        }

        // STARFIELD ENGINE
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) { stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.2, speed: Math.random()*0.15 }); }
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(drawStars);
        }

        initStars(); drawStars();
        window.addEventListener('resize', initStars);
    </script>
</body>
</html>
