
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <style>
        /* Base Reset & Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        /* Seamless Grid Container */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 0;
            width: 100vw;
            min-height: 100vh;
        }

        /* Product Container */
        .product-item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1 / 1; /* Keeps the grid squares uniform */
        }

        /* Image Styling - Default to Grayscale */
        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.4s ease;
        }

        /* Image Hover - Revert to Color */
        .product-item:hover .product-image {
            filter: grayscale(0%);
        }

        /* Overlay Styling - Hidden by Default */
        .product-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* Overlay Hover - Fade In */
        .product-item:hover .product-overlay {
            opacity: 1;
        }

        /* Typography & Button */
        .product-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .buy-button {
            padding: 12px 24px;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid #000000;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .buy-button:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <div class="product-item">
            <img src="sm-01.jpg" alt="Item 01" class="product-image">
            <div class="product-overlay">
                <div class="product-title">Item 01</div>
                <a href="#" class="buy-button">Buy</a>
            </div>
        </div>

        <div class="product-item">
            <img src="sm-02.jpg" alt="Item 02" class="product-image">
            <div class="product-overlay">
                <div class="product-title">Item 02</div>
                <a href="#" class="buy-button">Buy</a>
            </div>
        </div>

        <div class="product-item">
            <img src="sm-03.jpg" alt="Item 03" class="product-image">
            <div class="product-overlay">
                <div class="product-title">Item 03</div>
                <a href="#" class="buy-button">Buy</a>
            </div>
        </div>

    </div>

</body>
</html>
