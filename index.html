<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldArch | Lookbook</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body { 
      background: #f0f0f0; /* Industrial Gray */
      font-family: 'IBM Plex Mono', monospace;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .runway-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10vh 0;
    }

    .look {
      width: 90%;
      max-width: 800px;
      margin-bottom: 150px; /* High breathing room between looks */
      padding: 20px;
      background: #f0f0f0;
    }

    .look img { 
      width: 100%; 
      height: auto;
      filter: contrast(1.1); /* Richardson Flash effect */
      display: block;
    }

    p {
      margin-top: 20px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-top: 1px solid #000;
      padding-top: 10px;
    }
  </style>
</head>

<body>
  <div class="runway-container">
    
    <div class="look">
      <img src="look-01.jpg" alt="MA-1 World Panel Jacket">
      <p>01 / MA-1 WORLD PANEL / RIPSTOP</p>
    </div>

    <div class="look">
      <img src="look-02.jpg" alt="Technical Cargo Systems">
      <p>02 / GEO-PANEL CARGO / 3L LAMINATE</p>
    </div>

  </div>
</body>
</html>
