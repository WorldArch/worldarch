<div id="hubLayer">
        <img src="majalperu.jpg" class="shoe orbit">
        <img src="mafulljggng3.jpg" class="shoe orbit delay-1">
        <img src="mafulljggng2.jpg" class="shoe orbit delay-2">
    </div>

    <div id="fashionOverlay">
        <div class="fashion-grid">
            <div class="fashion-unit"><img src="fefullwaleish2.jpg"></div>
            <div class="fashion-unit"><img src="fullpaint2.jpg"></div>
            <div class="fashion-unit"><img src="fefullcrop.jpg"></div>
            <div class="fashion-unit"><img src="febottom.jpg"></div>
            <div class="fashion-unit"><img src="majalperu.jpg"></div>
            <div class="fashion-unit"><img src="mafulljggng.jpg"></div>
            <div class="fashion-unit"><img src="Gemini_Generated_Image_gk8a6kgk8a6kgk8a.png"></div>
            <div class="fashion-unit"><img src="SM-01.jpg"></div>
            <div class="fashion-unit"><img src="VC-01.jpg"></div>
            <div class="fashion-unit"><img src="fefullcrop.jpg"></div>
            <div class="fashion-unit"><img src="fefullwaleish.jpg"></div>
            <div class="fashion-unit"><img src="fefullwaleish2.jpg"></div>
            <div class="fashion-unit"><img src="fullpaint.jpg"></div>
        </div>
    </div>

    <button class="close-archive" id="closeBtn" onclick="exitFashion()">CLOSE_SYSTEM</button>

    <script>
        // --- CONFIG ---
        const GITHUB_USER = 'YOUR_GITHUB_USERNAME'; 
        const GITHUB_REPO = 'YOUR_REPO_NAME';
        const MUSIC_FOLDER = ''; 

        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('mainTrack');
        const sidebar = document.getElementById('navSidebar');
        
        let playlist = []; 
        let trackIndex = 0;
        let isBooted = false;

        async function bootSystem() {
            if (isBooted) return;
            isBooted = true;

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${MUSIC_FOLDER}`);
                const files = await response.json();
                playlist = files
                    .filter(f => f.name.endsWith('.mp3') || f.name.endsWith('.wav'))
                    .map(f => f.download_url);

                if (playlist.length > 0) {
                    document.getElementById('logo').style.opacity = "0.02";
                    document.getElementById('hubLayer').classList.add('visible');
                    document.getElementById('heavyHUD').classList.add('visible');
                    loadTrack(0);
                } else {
                    document.getElementById('trackName').innerText = "SYSTEM_ERROR // NO_AUDIO";
                }
            } catch (err) {
                document.getElementById('trackName').innerText = "SYSTEM_ERROR // API_OFFLINE";
            }
            document.body.onclick = null;
        }

        function handleMouseMove() {
            if (isBooted) {
                sidebar.classList.add('reveal');
                clearTimeout(window.navTimeout);
                window.navTimeout = setTimeout(() => sidebar.classList.remove('reveal'), 3000);
            }
        }

        function loadTrack(index) {
            trackIndex = (index + playlist.length) % playlist.length;
            audio.src = playlist[trackIndex];
            const fileName = playlist[trackIndex].split('/').pop();
            const displayName = decodeURIComponent(fileName).replace(/\.[^/.]+$/, "").toUpperCase();
            document.getElementById('trackName').innerText = `HEAVY_SYSTEM // ${displayName}`;
            audio.play();
            document.getElementById('playPause').innerText = "STOP";
        }

        audio.onended = () => changeTrack(1);

        function togglePlay() {
            if (audio.paused) { 
                audio.play(); 
                document.getElementById('playPause').innerText = "STOP"; 
            } else { 
                audio.pause(); 
                document.getElementById('playPause').innerText = "PLAY"; 
            }
        }

        function changeTrack(dir) { loadTrack(trackIndex + dir); }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                document.getElementById('progress').style.width = (audio.currentTime / audio.duration * 100) + "%";
            }
        };

        function enterFashion() {
            document.getElementById('fashionOverlay').classList.add('active');
            document.getElementById('closeBtn').classList.add('visible');
            document.getElementById('hubLayer').style.opacity = "0";
        }

        function exitFashion() {
            document.getElementById('fashionOverlay').classList.remove('active');
            document.getElementById('closeBtn').classList.remove('visible');
            document.getElementById('hubLayer').style.opacity = "0.35";
        }

        // --- STARFIELD ---
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) { 
                stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.2, speed: Math.random()*0.1 }); 
            }
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height); 
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            stars.forEach(s => { 
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); 
                s.y += s.speed; if(s.y > canvas.height) s.y = 0; 
            });
            requestAnimationFrame(drawStars);
        }

        initStars(); drawStars();
        window.onresize = initStars;
    </script>
</body>
</html>
