<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldArch - System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #2a2a2a; /* Smoke grey */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Helvetica', 'Arial', sans-serif;
            text-transform: uppercase;
        }

        /* Background Starfield */
        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Watermark Layer */
        .brand-watermark {
            position: absolute;
            font-weight: 900;
            font-size: 8vw;
            letter-spacing: -2px;
            opacity: 0.35;
            z-index: 1;
            user-select: none;
            pointer-events: none;
        }

        /* Shoe/Orbit Layer */
        .orbit-container {
            position: relative;
            width: 1px; height: 1px;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shoe {
            position: absolute;
            width: 250px;
            height: auto;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            z-index: 5;
        }

        .orbit {
            position: absolute;
            animation: orbit 15s linear infinite;
        }

        .delay { animation-delay: -7.5s; }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(260px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(260px) rotate(-360deg); }
        }

        .shoe:hover {
            filter: brightness(1.3) contrast(1.1);
            transform: scale(1.4) !important;
            z-index: 999 !important; /* Forces hovered shoe to forefront */
        }

        /* Support Button Styling */
        .support-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            z-index: 100;
            font-size: 10px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .support-trigger:hover {
            background: #fff;
            color: #000;
        }

        /* Crypto Support Overlay */
        #supportOverlay {
            display: none; /* Hidden by default */
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .support-content {
            text-align: center;
            width: 300px;
        }

        .support-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .support-form input, .support-form select {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 12px;
            color: #fff;
            font-family: inherit;
            text-transform: uppercase;
        }

        .support-form button {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-weight: 900;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>

    <div class="brand-watermark">WorldArch</div>

    <div class="orbit-container">
        <img src="SM-01.jpg" class="shoe orbit" alt="SM-01">
        <img src="VC-01.jpg" class="shoe orbit delay" alt="VC-01">
    </div>

    <button class="support-trigger" onclick="toggleSupport()">SUPPORT_SYSTEM</button>

    <div id="supportOverlay">
        <div class="support-content">
            <h2 style="font-size: 14px; letter-spacing: 5px;">INITIATE_CONTRIBUTION</h2>
            <p style="font-size: 10px; opacity: 0.5;">REQUEST CRYPTO ROUTING ADDRESS</p>
            
            <form action="https://formspree.io/f/YOUR_ID" method="POST" class="support-form">
                <input type="text" name="name" placeholder="IDENTIFIER" required>
                <input type="email" name="email" placeholder="EMAIL" required>
                <select name="asset">
                    <option value="ETH">ETHEREUM (ETH)</option>
                    <option value="BTC">BITCOIN (BTC)</option>
                    <option value="SOL">SOLANA (SOL)</option>
                </select>
                <button type="submit">REQUEST_ROUTING</button>
            </form>
            
            <p onclick="toggleSupport()" style="cursor: pointer; font-size: 10px; margin-top: 25px; opacity: 0.3;">[ CLOSE_SESSION ]</p>
        </div>
    </div>

    <script>
        // Starfield Logic
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starfield.appendChild(star);
        }

        // Support Modal Toggle
        function toggleSupport() {
            const overlay = document.getElementById('supportOverlay');
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        }
    </script>
</body>
</html>
