<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldArch - System</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; font-family: Helvetica, Arial, sans-serif; 
            text-transform: uppercase; cursor: crosshair;
        }
        
        canvas#starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* Initial Branding */
        .brand-watermark { 
            position: absolute; z-index: 10; text-align: center; 
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-title { font-weight: 900; font-size: 8vw; opacity: 0.15; letter-spacing: -4px; line-height: 0.8; }
        .sub-title { font-size: 1.1vw; letter-spacing: 10px; opacity: 0.08; margin-top: 10px; }

        /* Orbit Engine */
        #orbitLayer { 
            opacity: 0; transition: opacity 2s ease; pointer-events: none; 
            position: relative; z-index: 50; width: 1px; height: 1px; 
        }
        .shoe { position: absolute; width: 240px; transform-origin: center; margin-left: -120px; margin-top: -120px; opacity: 0.4; filter: grayscale(1); }
        .orbit { animation: orbit 25s linear infinite; }
        .delay-1 { animation-delay: -8.3s; }
        .delay-2 { animation-delay: -16.6s; }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(320px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(320px) rotate(-360deg); }
        }

        /* The Separate Fashion Archive (Overlay) */
        #fashionArchive {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.98); z-index: 500;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px; padding: 100px 50px; overflow-y: auto;
            opacity: 0; pointer-events: none; transition: 0.8s;
            backdrop-filter: blur(30px);
        }
        #fashionArchive.active { opacity: 1; pointer-events: auto; }

        .archive-item { position: relative; border: 1px solid rgba(255,255,255,0.05); padding: 5px; transition: 0.5s; }
        .archive-item:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-10px); }
        .archive-item img { width: 100%; height: auto; filter: grayscale(1); transition: 0.5s; }
        .archive-item:hover img { filter: grayscale(0); }
        .archive-meta { font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.4); padding: 15px 5px; }

        /* UI HUD */
        #heavyPlayer { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); width: 260px; z-index: 600; text-align: center; opacity: 0; transition: 1.5s; }
        .ui-btn { position: fixed; bottom: 30px; background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); padding: 10px 18px; cursor: pointer; font-size: 8px; letter-spacing: 3px; z-index: 600; opacity: 0; transition: 1.5s; }
        .left-btn { left: 30px; } .right-btn { right: 30px; }
        #closeArchive { display: none; }
    </style>
</head>
<body onclick="bootSystem()">

    <canvas id="starfield"></canvas>

    <div id="heavyPlayer">
        <div id="trackInfo" style="font-size: 8px; letter-spacing: 3px; margin-bottom: 12px;">HEAVY_SYSTEM // ACTIVE</div>
        <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.1);"><div id="progressFill" style="height: 100%; background: #fff; width: 0%;"></div></div>
        <audio id="mainTrack"></audio>
    </div>

    <button class="ui-btn left-btn" id="archiveToggle" onclick="toggleArchive(event)">ARCHIVE</button>
    <button class="ui-btn right-btn" id="btnSupport">SUPPORT</button>

    <div class="brand-watermark" id="bootLogo">
        <div class="main-title">WorldArch</div>
        <div class="sub-title" id="bootSub">Click to Initialize</div>
    </div>

    <div id="orbitLayer">
        <img src="majalperu.jpg" class="shoe orbit">
        <img src="mafulljggng3.jpg" class="shoe orbit delay-1">
        <img src="mafulljggng2.jpg" class="shoe orbit delay-2">
    </div>

    <div id="fashionArchive">
        <div class="archive-item"><img src="majalperu.jpg"><div class="archive-meta">UNIT: PERU_01</div></div>
        <div class="archive-item"><img src="mafulljggng.jpg"><div class="archive-meta">UNIT: JG_01</div></div>
        <div class="archive-item"><img src="mafulljggng2.jpg"><div class="archive-meta">UNIT: JG_02</div></div>
        <div class="archive-item"><img src="mafulljggng3.jpg"><div class="archive-meta">UNIT: JG_03</div></div>
        <div class="archive-item"><img src="fullpaint.jpg"><div class="archive-meta">UNIT: PAINT_01</div></div>
        <div class="archive-item"><img src="fullpaint2.jpg"><div class="archive-meta">UNIT: PAINT_02</div></div>
        <div class="archive-item"><img src="fefullwaleish.jpg"><div class="archive-meta">UNIT: WALEISH_01</div></div>
        <div class="archive-item"><img src="fefullwaleish2.jpg"><div class="archive-meta">UNIT: WALEISH_02</div></div>
        <div class="archive-item"><img src="fefullcrop.jpg"><div class="archive-meta">UNIT: FE_CROP</div></div>
        <div class="archive-item"><img src="febottom.jpg"><div class="archive-meta">UNIT: FE_BOTTOM</div></div>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('mainTrack');
        const playlist = ["soul%20breaks.mp3", "iano%20choppers.mp3"];
        
        // BOOT SYSTEM
        function bootSystem() {
            document.getElementById('bootLogo').style.opacity = "0.02";
            document.getElementById('bootSub').innerText = "System Active";
            document.getElementById('orbitLayer').style.opacity = "1";
            document.getElementById('heavyPlayer').style.opacity = "0.2";
            document.getElementById('archiveToggle').style.opacity = "1";
            document.getElementById('btnSupport').style.opacity = "1";
            
            audio.src = playlist[0];
            audio.play();
            document.body.onclick = null; // Kill the boot click
        }

        // TOGGLE FASHION SEPARATELY
        function toggleArchive(e) {
            e.stopPropagation(); // Stop click from triggering other things
            const archive = document.getElementById('fashionArchive');
            const btn = document.getElementById('archiveToggle');
            
            if(archive.classList.contains('active')) {
                archive.classList.remove('active');
                btn.innerText = "ARCHIVE";
                document.getElementById('orbitLayer').style.opacity = "1";
            } else {
                archive.classList.add('active');
                btn.innerText = "CLOSE";
                document.getElementById('orbitLayer').style.opacity = "0";
            }
        }

        // STARFIELD ENGINE
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) { stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.2, speed: Math.random()*0.15 }); }
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(drawStars);
        }

        initStars(); drawStars();
        window.addEventListener('resize', initStars);
    </script>
</body>
</html>
