<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | Prototype</title>
    <style>
        /* BASE STYLES */
        body, html { 
            margin: 0; padding: 0; background: #000; color: #fff; 
            font-family: 'Courier New', monospace; overflow-x: hidden; 
        }

        nav { padding: 20px; position: fixed; top: 0; z-index: 100; background: rgba(0,0,0,0.8); width: 100%; }
        .fashion-trigger { color: #fff; text-decoration: none; cursor: crosshair; font-weight: bold; letter-spacing: 2px; }

        /* PRODUCT GRID (STATIC) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50vw, 1fr));
            gap: 1px; background: #111; margin-top: 80px;
        }

        .card {
            background: #000; height: 70vh; display: flex;
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .card img { max-width: 80%; transition: 0.6s; filter: grayscale(100%); }
        .card:hover img { filter: grayscale(0%); transform: scale(1.05); }

        /* THE FASHION OVERLAY (THE GATE) */
        #fashion-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: #000;
            z-index: 999; overflow-y: auto; padding: 40px; box-sizing: border-box;
        }

        .close-btn {
            position: fixed; top: 20px; right: 20px; background: #fff; 
            border: none; color: #000; cursor: pointer; padding: 10px 20px; 
            font-family: inherit; font-weight: bold; z-index: 1000;
        }

        /* THE FASHION DUMP GRID (DYNAMIC) */
        #fashion-dump {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 1px; background: #111; margin-top: 40px;
        }

        .fashion-card { background: #000; height: 50vh; position: relative; overflow: hidden; }
        .fashion-card img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .fashion-card:hover img { filter: grayscale(0%); }
        .feature-shot { grid-column: span 2; }

        .session-label {
            position: absolute; bottom: 10px; left: 10px; font-size: 10px;
            background: #000; color: #fff; padding: 5px; opacity: 0; transition: 0.3s;
        }
        .fashion-card:hover .session-label { opacity: 1; }

        @media (max-width: 768px) {
            #fashion-dump { grid-template-columns: repeat(2, 1fr); }
            .product-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="fashion-trigger" onclick="openFashion(event)">[ ACCESS_FASHION_ARCHIVE ]</a>
    </nav>

    <div class="product-grid">
        <div class="card">
            <img src="https://www.manorphx.com/cdn/shop/articles/nike-air-max-1-86-og-big-bubble-release-information.jpg?v=1680626517">
            </div>
        <div class="card"><div style="color:#222">ARCHIVE_SLOT_02</div></div>
    </div>

    <div id="fashion-overlay">
        <button class="close-btn" onclick="closeFashion()">CLOSE [X]</button>
        <div id="fashion-dump">
            </div>
    </div>

    <script>
        // OPEN THE FASHION OVERLAY
        function openFashion(e) {
            e.preventDefault();
            document.getElementById('fashion-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Stop background scrolling
            loadFashion(); 
        }

        // CLOSE THE FASHION OVERLAY
        function closeFashion() {
            document.getElementById('fashion-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // FETCH DATA FROM JSON AND DUMP INTO GRID
        async function loadFashion() {
            const grid = document.getElementById('fashion-dump');
            if (grid.children.length > 0) return; // Prevent duplicate loads

            try {
                const response = await fetch('./fashion.json');
                const data = await response.json();

                data.images.forEach((img, index) => {
                    const card = document.createElement('div');
                    // Every 3rd image is a "Feature" (Wide)
                    card.className = (index + 1) % 3 === 0 ? 'fashion-card feature-shot' : 'fashion-card';
                    
                    card.innerHTML = `
                        <img src="${img.url}" alt="Archive">
                        <div class="session-label">${img.label || 'SAMPLE_UNRELEASED'}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error("Could not load fashion.json. Make sure it exists in your repo.");
            }
        }
    </script>
</body>
</html>
