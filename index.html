<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldArch - Archive</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; font-family: 'IBM Plex Mono', Helvetica, monospace; 
            text-transform: uppercase; cursor: crosshair;
        }
        
        canvas#starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* Branding Layer */
        .brand-watermark { 
            position: absolute; z-index: 10; text-align: center; 
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-title { font-weight: 900; font-size: 8vw; opacity: 0.15; letter-spacing: -4px; line-height: 0.8; }
        .sub-title { font-size: 10px; letter-spacing: 10px; opacity: 0.08; margin-top: 15px; }

        /* The Main Orbit Hub */
        #orbitLayer { 
            opacity: 0; transition: opacity 2s ease; pointer-events: none; 
            position: relative; z-index: 50; width: 1px; height: 1px; 
        }
        .shoe { position: absolute; width: 240px; transform-origin: center; margin-left: -120px; margin-top: -120px; opacity: 0.4; filter: grayscale(1); }
        .orbit { animation: orbit 30s linear infinite; }
        .delay-1 { animation-delay: -10s; }
        .delay-2 { animation-delay: -20s; }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(350px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(350px) rotate(-360deg); }
