<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldArch | Lookbook</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body { 
      background: #f0f0f0; /* Industrial Gray */
      font-family: 'IBM Plex Mono', monospace;
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .runway-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5vh;
    }

    .look {
      width: 90%;
      max-width: 1000px;
      margin-bottom: 25vh; /* Extreme vertical spacing for breathing room */
      position: relative;
    }

    .look img { 
      width: 100%; 
      height: auto;
      filter: contrast(1.1); /* Richardson Flash aesthetic */
      display: block;
    }

    .meta-data {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-top: 1px solid #000;
      padding-top: 8px;
    }

    /* Sticky Indicator for scrolling */
    .look-number {
      position: absolute;
      left: -60px;
      top: 0;
      font-weight: 700;
    }

    @media (max-width: 1100px) {
      .look-number { position: static; margin-bottom: 10px; }
      .look { width: 95%; }
    }
  </style>
</head>

<body>
  <div class="runway-container">
    
    <div class="look">
      <div class="look-number">01</div>
      <img src="look-01.jpg" alt="MA-1 World Panel Jacket">
      <div class="meta-data">
        <span>MA-1 World Panel</span>
        <span>Textile: Ripstop</span>
      </div>
    </div>
