<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>worldarch</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
        }
        header {
            padding: 24px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            letter-spacing: 2px;
            border-bottom: 1px solid #000; /* Added a thin line for that tech look */
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px; /* Tighter gap for a seamless look */
            padding-top: 80px;
            background-color: #000; /* Makes the gaps look like black grid lines */
        }
        .product-wrap {
            position: relative;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            background-color: #f0f0f0;
        }
        .product-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%); /* Slight desaturation for the aesthetic */
            transition: filter 0.3s ease;
        }
        .product-wrap:hover img {
            filter: grayscale(0%);
        }
        /* Refined Hover Label */
        .label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px;
            background: #000; /* Black label background */
            color: #fff; /* White text for contrast */
            font-size: 10px;
            letter-spacing: 1px;
            transform: translateY(100%);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .product-wrap:hover .label {
            transform: translateY(0);
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <strong>WORLD ARCH</strong>
    </header>

    <main class="grid">
        <div class="product-wrap">
            <img src="sm-01.jpg" alt="SM-01">
            <div class="label">SM-01 // TECHNICAL SPEC</div>
        </div>

        <div class="product-wrap">
            <img src="ar-01.jpg" alt="AR-01">
            <div class="label">AR-01 // ARCHIVE SERIES</div>
        </div>

        <div class="product-wrap">
            <img src="vc-01.jpg" alt="VC-01">
            <div class="label">VC-01 // VECTOR CORE</div>
        </div>
    </main>

</body>
</html>
