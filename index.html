<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>worldarch</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Space Mono', monospace;
            text-transform: uppercase;
        }
        header {
            padding: 24px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            padding-top: 80px;
        }
        .product-wrap {
            display: flex;
            flex-direction: column;
        }
        .grid-item {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background-color: #f0f0f0;
        }
        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .label {
            padding: 12px;
            font-size: 10px;
            letter-spacing: 1px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <strong>WORLD ARCH</strong>
    </header>

    <main class="grid">
        <div class="product-wrap">
            <div class="grid-item">
                <img src="sm-01.jpg" alt="SM-01">
            </div>
            <div class="label">SM-01</div>
        </div>

        <div class="product-wrap">
            <div class="grid-item">
                <img src="ar-01.jpg" alt="AR-01">
            </div>
            <div class="label">AR-01</div>
        </div>

        <div class="product-wrap">
            <div class="grid-item">
                <img src="vc-01.jpg" alt="VC-01">
            </div>
            <div class="label">VC-01</div>
        </div>
    </main>

</body>
</html>
