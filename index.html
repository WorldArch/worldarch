<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldArch - System</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background: #0a0a0a; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; color: #fff; font-family: 'Courier New', Courier, monospace; 
            text-transform: uppercase; cursor: crosshair;
        }
        
        canvas#starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* Initial Branding */
        .brand-watermark { 
            position: absolute; z-index: 10; text-align: center; 
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-title { font-weight: 900; font-size: 8vw; opacity: 0.1; letter-spacing: -4px; line-height: 0.8; pointer-events: none; }

        /* Left Dynamic Navigation (Hidden until Mouse Move) */
        #navSidebar {
            position: fixed; left: 40px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px;
            opacity: 0; transform: translateX(-20px);
            transition: 1s cubic-bezier(0.16, 1, 0.3, 1); z-index: 200;
        }
        #navSidebar.reveal { opacity: 1; transform: translateX(0); }

        .nav-unit { 
            width: 70px; height: 100px; border: 1px solid rgba(255,255,255,0.05); 
            overflow: hidden; transition: 0.4s; cursor: pointer;
        }
        .nav-unit:hover { border-color: #fff; transform: scale(1.05); }
        .nav-unit img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1) brightness(0.3); transition: 0.5s; }
        .nav-unit:hover img { filter: grayscale(0) brightness(1); }

        /* Central Orbit Hub */
        #hubLayer { 
            opacity: 0; transition: opacity 1.5s ease; pointer-events: auto; 
            position: relative; z-index: 50; width: 600px; height: 600px; 
            display: flex; justify-content: center; align-items: center;
        }
        .shoe { position: absolute; width: 220px; opacity: 0.35; filter: grayscale(1); pointer-events: none; }
        .orbit { animation: orbit 30s linear infinite; }
        .delay-1 { animation-delay: -10s; }
        .delay-2 { animation-delay: -20s; }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(320px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(320px) rotate(-360deg); }
        }

        /* Player UI */
        #heavyHUD { 
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%); 
            z-index: 600; opacity: 0; transition: 1s; text-align: center; min-width: 300px;
        }
        .player-status { font-size: 8px; letter-spacing: 4px; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
        .player-controls { display: flex; justify-content: center; gap: 25px; margin-top: 15px; }
        .p-btn { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 10px; cursor: pointer; transition: 0.3s; }
        .p-btn:hover { color: #fff; }

        /* Fashion Grid */
        #fashionOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.99); z-index: 700;
            display: flex; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.8s;
            backdrop-filter: blur(40px); overflow-y: scroll;
        }
        #fashionOverlay.active { opacity: 1; pointer-events: auto; }
        .fashion-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; width: 90%; padding: 120px 0; }
        .fashion-unit { border: 1px solid rgba(255,255,255,0.05); padding: 5px; }
        .fashion-unit img { width: 100%; filter: grayscale(1); transition: 0.8s; }
        .fashion-unit:hover img { filter: grayscale(0); }

        .close-archive { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            border: 1px solid #fff; background: none; color: #fff; padding: 12px 30px;
            font-size: 8px; letter-spacing: 5px; cursor: pointer; z-index: 800; opacity: 0; transition: 0.5s;
        }
        .visible { opacity: 1 !important; }
    </style>
</head>
<body onclick="bootSystem()" onmousemove="handleMouseMove()">

    <canvas id="starfield"></canvas>

    <div class="brand-watermark" id="logo">
        <div class="main-title">WorldArch</div>
    </div>

    <div id="heavyHUD">
        <div class="player-status" id="trackName">HEAVY_SYSTEM // IDLE</div>
        <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.1);"><div id="progress" style="width: 0%; height: 100%; background: #fff;"></div></div>
        <div class="player-controls">
            <button class="p-btn" onclick="changeTrack(-1)">PREV</button>
            <button class="p-btn" id="playPause" onclick="togglePlay()">STOP</button>
            <button class="p-btn" onclick="changeTrack(1)">NEXT</button>
        </div>
        <audio id="mainTrack"></audio>
    </div>

    <div id="navSidebar">
        <div class="nav-unit" onclick="enterFashion()"><img src="fefullwaleish2.jpg"></div>
        <div class="nav-unit" onclick="enterFashion()"><img src="fullpaint2.jpg"></div>
        <div class="nav-unit" onclick="enterFashion()"><img src="fefullcrop.jpg"></div>
    </div>

    <div id="hubLayer">
        <img src="majalperu.jpg" class="shoe orbit">
        <img src="mafulljggng3.jpg" class="shoe orbit delay-1">
        <img src="mafulljggng2.jpg" class="shoe orbit delay-2">
    </div>

    <div id="fashionOverlay">
        <div class="fashion-grid">
            <div class="fashion-unit"><img src="fefullwaleish2.jpg"></div>
            <div class="fashion-unit"><img src="fullpaint2.jpg"></div>
            <div class="fashion-unit"><img src="fefullcrop.jpg"></div>
            <div class="fashion-unit"><img src="febottom.jpg"></div>
            <div class="fashion-unit"><img src="majalperu.jpg"></div>
            <div class="fashion-unit"><img src="mafulljggng.jpg"></div>
        </div>
    </div>

    <button class="close-archive" id="closeBtn" onclick="exitFashion()">CLOSE_SYSTEM</button>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('mainTrack');
        const sidebar = document.getElementById('navSidebar');
        const playlist = ["soul%20breaks.mp3", "iano%20choppers.mp3"];
        let trackIndex = 0;
        let isBooted = false;

        function bootSystem() {
            isBooted = true;
            document.getElementById('logo').style.opacity = "0.02";
            document.getElementById('hubLayer').classList.add('visible');
            document.getElementById('heavyHUD').classList.add('visible');
            loadTrack(0);
            document.body.onclick = null;
        }

        // REVEAL ON MOUSE MOVE
        function handleMouseMove() {
            if (isBooted) {
                sidebar.classList.add('reveal');
                // Optional: Sidebar fades out after 3 seconds of no movement
                clearTimeout(window.navTimeout);
                window.navTimeout = setTimeout(() => {
                    sidebar.classList.remove('reveal');
                }, 3000);
            }
        }

        // PLAYER
        function loadTrack(index) {
            trackIndex = index;
            if (trackIndex < 0) trackIndex = playlist.length - 1;
            if (trackIndex >= playlist.length) trackIndex = 0;
            audio.src = playlist[trackIndex];
            document.getElementById('trackName').innerText = playlist[trackIndex].replace('%20', ' ').toUpperCase();
            audio.play();
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('playPause').innerText = "STOP"; }
            else { audio.pause(); document.getElementById('playPause').innerText = "PLAY"; }
        }

        function changeTrack(dir) { loadTrack(trackIndex + dir); }

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress').style.width = pct + "%";
        };

        // NAVIGATION
        function enterFashion() {
            document.getElementById('fashionOverlay').classList.add('active');
            document.getElementById('closeBtn').classList.add('visible');
            document.getElementById('hubLayer').style.opacity = "0";
        }

        function exitFashion() {
            document.getElementById('fashionOverlay').classList.remove('active');
            document.getElementById('closeBtn').classList.remove('visible');
            document.getElementById('hubLayer').style.opacity = "0.35";
        }

        // STARFIELD
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) { stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.2, speed: Math.random()*0.1 }); }
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(drawStars);
        }

        initStars(); drawStars();
        window.onresize = initStars;
    </script>
</body>
</html>
