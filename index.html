<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WorldArch - System</title>
    
    <script>
        // --- 1. CONFIGURATION ---
        const GITHUB_USER = 'YOUR_GITHUB_USERNAME'; 
        const GITHUB_REPO = 'YOUR_REPO_NAME';
        const IMAGES = ['fefullwaleish2.jpg', 'fullpaint2.jpg', 'fefullcrop.jpg', 'febottom.jpg', 'majalperu.jpg'];

        let audio, playStopBtn, playlist = [], trackIndex = 0, isBooted = false;

        // --- 2. SYSTEM LOGIC ---
        window.bootSystem = async function() {
            if (isBooted) return; 
            isBooted = true;
            
            audio = document.getElementById('mainTrack');
            
            // Interaction Handshake for Audio
            audio.play().then(() => { audio.pause(); audio.currentTime = 0; }).catch(e => console.log("Awaiting Interaction"));

            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                const files = await res.json();
                playlist = files.filter(f => f.name.toLowerCase().endsWith('.mp3')).map(f => f.download_url);
                
                if (playlist.length > 0) { 
                    loadTrack(0); 
                    document.getElementById('heavyHUD').classList.add('visible'); 
                }
                document.getElementById('hubLayer').style.opacity = "0.35";
            } catch (e) { console.error("CONNECTION_ERROR"); }
        };

        window.loadTrack = function(i) {
            if (playlist.length === 0) return;
            trackIndex = (i + playlist.length) % playlist.length;
            audio.src = playlist[trackIndex];
            const name = decodeURIComponent(playlist[trackIndex].split('/').pop()).replace('.mp3', '').toUpperCase();
            document.getElementById('trackName').innerText = `HEAVY_SYSTEM // ${name}`;
            audio.load();
            audio.play();
            if (playStopBtn) playStopBtn.innerText = "STOP";
        };

        window.toggleStop = function() {
            if (audio.paused) { audio.play(); playStopBtn.innerText = "STOP"; }
            else { audio.pause(); audio.currentTime = 0; playStopBtn.innerText = "PLAY"; document.getElementById('progress').style.width = "0%"; }
        };

        window.changeTrack = function(d) { loadTrack(trackIndex + d); };

        window.openLayer = function(id) {
            document.querySelectorAll('.system-overlay').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('closeBtn').classList.add('visible');
            document.getElementById('hubLayer').style.opacity = "0";
        };

        window.closeAll = function() {
            document.querySelectorAll('.system-overlay').forEach(el => el.classList.remove('active'));
            document.getElementById('closeBtn').classList.remove('visible');
            if(isBooted) document.getElementById('hubLayer').style.opacity = "0.35";
        };

        window.onload = () => {
            playStopBtn = document.getElementById('playStopBtn');
            initStars(); 
            drawStars();
        };

        let canvas, ctx, stars = [];
        function initStars() {
            canvas = document.getElementById('starfield');
            ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = Array(150).fill().map(() => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.2, v: Math.random()*0.15 }));
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = 'rgba(255,255,255,0.4)';
            stars.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, 7); ctx.fill(); p.y += p.v; if(p.y > canvas.height) p.y = 0; });
            requestAnimationFrame(drawStars);
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; text-transform: uppercase; user-select: none; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas#starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .main-title { position: absolute; font-size: 8vw; opacity: 0.05; letter-spacing: -4px; z-index: 2; pointer-events: none; }
        
        #navSidebar { position: fixed; left: 40px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 1000; }
        .nav-unit { width: 70px; height: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; }
        
        #hubLayer { opacity: 0; transition: 1.5s; position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; width: 600px; height: 600px; }
        .shoe { position: absolute; width: 220px; opacity: 0.35; pointer-events: none; filter: grayscale(1); }
        .orbit { animation: orbit 30s linear infinite; }
        .delay-1 { animation-delay: -10s; } .delay-2 { animation-delay: -20s; }
        @keyframes orbit { 0% { transform: rotate(0deg) translateX(300px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(300px) rotate(-360deg); } }

        #heavyHUD { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); z-index: 1000; text-align: center; opacity: 0; transition: 1s; min-width: 300px; }
        #heavyHUD.visible { opacity: 1; }
        .p-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-size: 9px; cursor: pointer; margin: 0 10px; letter-spacing: 2px; }

        .system-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.98); z-index: 2000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.5s; backdrop-filter: blur(40px); }
        .system-overlay.active { opacity: 1; pointer-events: auto; }
        .close-btn { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); border: 1px solid #fff; background: #000; color: #fff; padding: 15px 40px; font-size: 8px; letter-spacing: 5px; cursor: pointer; z-index: 3000; opacity: 0; transition: 0.5s; pointer-events: none; }
        .close-btn.visible { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body onclick="bootSystem()">

    <canvas id="starfield"></canvas>
    <div class="main-title">WorldArch</div>

    <div id="heavyHUD">
        <div id="trackName" style="font-size: 8px; color: rgba(255,255,255,0.4); margin-bottom: 8px;">HEAVY_SYSTEM // IDLE</div>
        <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.1);"><div id="progress" style="width: 0%; height: 100%; background: #fff;"></div></div>
        <div style="margin-top: 15px;">
            <button class="p-btn" onclick="changeTrack(-1)">BACK</button>
            <button class="p-btn" id="playStopBtn" onclick="toggleStop()">STOP</button>
            <button class="p-btn" onclick="changeTrack(1)">FORWARD</button>
        </div>
        <audio id="mainTrack" ontimeupdate="if(this.duration) document.getElementById('progress').style.width = (this.currentTime/this.duration*100) + '%'"></audio>
    </div>

    <div id="navSidebar">
        <div class="nav-unit" onclick="openLayer('aboutOverlay')"><span style="font-size: 8px; color: rgba(255,255,255,0.5);">BIO</span></div>
        <div class="nav-unit" onclick="openLayer('contactOverlay')"><span style="font-size: 8px; color: rgba(255,255,255,0.5);">COMMS</span></div>
    </div>

    <div id="hubLayer">
        <img src="majalperu.jpg" class="shoe orbit">
        <img src="mafulljggng3.jpg" class="shoe orbit delay-1">
        <img src="mafulljggng2.jpg" class="shoe orbit delay-2">
    </div>

    <div id="aboutOverlay" class="system-overlay">
        <div style="width: 80%; max-width: 600px; text-align: left; font-size: 10px; line-height: 1.8; letter-spacing: 2px;">
            <h2 style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">MANIFESTO_001</h2>
            <p><strong>ENTITY:</strong> IKENNA</p>
            <p><strong>MEDIUM:</strong> CONCEPTUAL SNEAKER FUSION // HEAVY SONICS</p>
            <p><strong>RESEARCH:</strong> TECHNICAL GARMENT CONSTRUCTION, ANATOMICAL PANELING, SP-404 BASS ENGINEERING.</p>
        </div>
    </div>

    <div id="contactOverlay" class="system-overlay">
        <div style="width: 80%; max-width: 600px; text-align: left;">
            <h2>COMMS_PROTOCOL</h2>
            <p>EMAIL: CONTACT@WORLDARCH.SYSTEM</p>
        </div>
    </div>

    <button class="close-btn" id="closeBtn" onclick="closeAll()">CLOSE_SYSTEM</button>

</body>
</html>
