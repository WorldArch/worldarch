<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldArch - System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: Helvetica, Arial, sans-serif; text-transform: uppercase; }
        .starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: #fff; border-radius: 50%; }

        /* Branding & Identity */
        .brand-watermark { position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 1; text-align: center; }
        .main-title { font-weight: 900; font-size: 8vw; opacity: 0.15; letter-spacing: -4px; line-height: 0.8; pointer-events: none; }
        .sub-title { font-size: 1.1vw; letter-spacing: 10px; opacity: 0.08; margin-top: 10px; pointer-events: none; }
        
        /* Instagram Access Link */
        .insta-tag { display: flex; align-items: center; gap: 10px; font-size: 8px; letter-spacing: 3px; color: #fff; text-decoration: none; opacity: 0.2; margin-top: 20px; transition: 0.4s; padding: 8px 15px; border: 1px solid transparent; }
        .insta-tag:hover { opacity: 1; background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); letter-spacing: 4px; }
        .insta-icon { width: 12px; height: 12px; stroke: #fff; fill: none; stroke-width: 2; }

        /* Triple Orbit Logic (18s Rotation / 3 = 6s Gaps) */
        .orbit-container { position: relative; z-index: 10; width: 1px; height: 1px; }
        .shoe { position: absolute; width: 160px; transition: 0.4s; cursor: pointer; transform-origin: center; }
        .orbit { animation: orbit 18s linear infinite; }
        .delay-1 { animation-delay: -6s; }
        .delay-2 { animation-delay: -12s; }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(200px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(200px) rotate(-360deg); }
        }
        .shoe:hover { filter: brightness(1.3); transform: scale(1.15) !important; z-index: 1000; }

        /* Music Player Interface */
        #heavyPlayer { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); width: 220px; z-index: 100; text-align: center; opacity: 0.3; transition: 0.5s; }
        #heavyPlayer:hover { opacity: 1; }
        #trackInfo { font-size: 8px; letter-spacing: 3px; margin-bottom: 8px; }
        #progressBar { width: 100%; height: 1px; background: rgba(255,255,255,0.1); cursor: pointer; }
        #progressFill { height: 100%; background: #fff; width: 0%; transition: width 0.1s linear; }

        /* UI Buttons */
        .ui-btn { position: fixed; bottom: 30px; background: none; border: 1px solid rgba(255,255,255,0.15); color: #fff; padding: 10px 18px; cursor: pointer; font-size: 9px; letter-spacing: 2px; z-index: 100; }
        .ui-btn:hover { background: #fff; color: #000; }
        .left-btn { left: 30px; } .right-btn { right: 30px; }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>

    <div id="heavyPlayer">
        <div id="trackInfo">HEAVY_SYSTEM // <span id="percent">00.0%</span></div>
        <div id="progressBar" onclick="scrub(event)">
            <div id="progressFill"></div>
        </div>
        <audio id="mainTrack" src="(Instrumental).mp3" loop></audio>
    </div>

    <div class="brand-watermark">
        <div class="main-title">WorldArch</div>
        <div class="sub-title">Heavy Records</div>
        
        <a href="https://instagram.com/xnewworld" target="_blank" class="insta-tag">
            <svg class="insta-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            @XNEWWORLD // [ ACCESS_DESIGNS ]
        </a>
    </div>

    <div class="orbit-container">
    <img src="SM-01.jpg" class="shoe orbit" alt="01">
    <img src="VC-01.jpg" class="shoe orbit delay-1" alt="02">
    <img src="AR-01.jpg" class="shoe orbit delay-2" alt="03"> </div>

    <button class="ui-btn left-btn">INQUIRY_SYSTEM</button>
    <button class="ui-btn right-btn">SUPPORT_SYSTEM</button>

    <script>
        const audio = document.getElementById('mainTrack');
const fill = document.getElementById('progressFill');
const trackInfoDiv = document.getElementById('trackInfo');

// --- THE REGISTRY ---
// Double-check these match your GitHub filenames EXACTLY
const playlist = [
    "(Instrumental).mp3", 
    "ty who 2 (Mashup).mp3",
    "Bubbles.mp3"
];

let trackIndex = 0;

function initTrack(i) {
    console.log(`SYSTEM_LOG: LOADING_TRACK // Index: ${i} // Name: ${playlist[i]}`);
    audio.src = playlist[i];
    
    const displayName = playlist[i].replace('.mp3', '').toUpperCase();
    trackInfoDiv.innerHTML = `HEAVY_SYSTEM // ${displayName} // STATUS: ACTIVE // <span id="percent">00.0%</span>`;
    
    audio.load();
}

// --- THE AUTO-ROTATE FIX ---
audio.onended = () => {
    console.log("SYSTEM_LOG: TRACK_ENDED // TRIGGERING_NEXT");
    trackIndex++; 
    
    if (trackIndex >= playlist.length) {
        trackIndex = 0; 
    }
    
    initTrack(trackIndex);
    
    // Small delay to ensure the browser registers the new source
    setTimeout(() => {
        audio.play().catch(err => console.log("Playback blocked: " + err));
    }, 100);
};

// Error Catcher: Tells you if a file is missing
audio.onerror = () => {
    console.error(`SYSTEM_ERROR: CANNOT_FIND_FILE // ${playlist[trackIndex]}`);
    trackInfoDiv.innerHTML = `HEAVY_SYSTEM // ERROR: FILE_NOT_FOUND // <span id="percent">00.0%</span>`;
};

audio.ontimeupdate = () => {
    if (audio.duration) {
        const p = (audio.currentTime / audio.duration) * 100;
        fill.style.width = p + '%';
        const livePercent = document.getElementById('percent');
        if(livePercent) livePercent.innerText = p.toFixed(1) + '%';
    }
};

function scrub(e) {
    const rect = document.getElementById('progressBar').getBoundingClientRect();
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    audio.play();
}

// BOOT
initTrack(trackIndex);
document.body.addEventListener('click', () => { if(audio.paused) audio.play(); }, {once: true});
    </script>
</body>
</html>
