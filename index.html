<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldArch - System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #2a2a2a; /* Smoke Grey */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            font-family: 'Helvetica', 'Arial', sans-serif;
            text-transform: uppercase;
        }

        /* 1. Background Layer */
        .starfield {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* 2. Middle Layer (Branding) */
        .brand-watermark {
            position: absolute;
            text-align: center;
            z-index: 1; /* Sits behind shoes */
            user-select: none;
            pointer-events: none;
        }
        .main-logo { font-weight: 900; font-size: 8vw; letter-spacing: -2px; opacity: 0.2; }
        .sub-logo { font-size: 1.5vw; letter-spacing: 10px; opacity: 0.1; margin-top: 10px; }

        /* 3. Interaction Layer (The Galaxy) */
        .orbit-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5; /* Sits above watermark */
        }

        .shoe {
            position: absolute;
            width: 140px; /* Base size for high volume */
            height: auto;
            cursor: pointer;
            z-index: 10;
            /* Anchors position to the orbit */
            transform: translate(var(--x), var(--y));
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s;
        }

        .shoe:hover {
            /* scale(2.5) brings it to the forefront visually */
            transform: translate(var(--x), var(--y)) scale(2.5) !important;
            z-index: 999 !important; /* Absolute forefront */
            filter: brightness(1.2) drop-shadow(0 0 30px rgba(255,255,255,0.4));
        }

        /* 4. UI Layer (Contact) */
        .contact-trigger {
            position: fixed;
            bottom: 30px; right: 30px;
            background: none; border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 20px;
            cursor: pointer; z-index: 1000;
            font-size: 10px; letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="starfield" id="starfield"></div>

    <div class="brand-watermark">
        <div class="main-logo">WorldArch</div>
        <div class="sub-logo">It Heavy Records</div>
    </div>

    <div class="orbit-container" id="galaxy"></div>

    <button class="contact-trigger" onclick="alert('System Ready - Add Formspree ID to enable')">INQUIRY</button>

    <script>
        // --- ADD YOUR 20+ FILENAMES HERE ---
        const images = [
            'AR-01.jpg', 'SM-01.jpg', 'VC-01.jpg',
            'AR-02.jpg', 'SM-02.jpg', 'VC-02.jpg'
            // Add the rest exactly like this
        ];

        const galaxy = document.getElementById('galaxy');
        const total = images.length;
        
        // Radius: 350px for desktop, 160px for mobile
        const radius = window.innerWidth > 768 ? 350 : 160;

        images.forEach((src, i) => {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'shoe';
            
            // Calculate orbit spacing
            const angle = (i / total) * Math.PI * 2;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;

            // Anchor CSS variables
            img.style.setProperty('--x', `${x}px`);
            img.style.setProperty('--y', `${y}px`);
            img.style.transform = `translate(${x}px, ${y}px)`;

            galaxy.appendChild(img);
        });

        // Background Star Logic
        const starfield = document.getElementById('starfield');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 2 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            starfield.appendChild(star);
        }
    </script>
</body>
</html>
